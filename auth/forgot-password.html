<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset password · GIA (DOST)</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../assets/css/style.css" rel="stylesheet">
</head>
<body>
<div class="auth-wrap">
  <aside class="auth-aside">
    <div class="field" aria-hidden="true">
      <span class="bh bh-1"></span><span class="bh bh-2"></span><span class="bh bh-3"></span>
    </div>
    <div class="brand-row">
      <img src="../assets/images/dost-logo.png" alt="DOST" width="32" height="32">
      <span>GIA <small style="font-weight:400;opacity:.6">· DOST</small></span>
    </div>
    <div>
      <p class="label-eyebrow" style="color:var(--gia-cyan)">Grants-in-Aid System</p>
      <h2>Forgot your password?</h2>
      <p>We'll email you a secure link to set a new one.</p>
    </div>
    <p class="mono small" style="opacity:.5">Department of Science and Technology</p>
  </aside>

  <main class="auth-main">
    <div class="auth-card">
      <p class="label-eyebrow">Account recovery</p>
      <h1 class="mb-1">Reset your password</h1>
      <p class="muted mb-4">Enter the email tied to your account.</p>
      <form action="#" method="post" novalidate>
        <div class="mb-4">
          <label class="form-label" for="email">Email address</label>
          <input type="email" class="form-control" id="email" placeholder="you@dost.gov.ph" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 mb-3">Send reset link</button>
        <p class="text-center muted small mb-0"><a href="login.html">Back to sign in</a></p>
      </form>
    </div>
  </main>
</div>
<script src="../assets/js/app.js"></script>
</body>
</html>
